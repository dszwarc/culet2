{% extends "base.html" %}

{% block content %}
<h1>Add Weight for Job {{ job }}</h1>

<p><strong>Name:</strong> {{ job.name }}</p>
<p><strong>Style:</strong> {{ job.style }}</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Weight</button>
</form>

<p>
    <a href="{% url 'culet:job_detail' job.pk %}">Back to Job</a>
</p>
{% endblock %}
