{% extends 'base.html' %}

{% block content %}

<div class="page-header">
  <h1>Assign Jobs</h1>
  <p>Scan multiple jobs, choose an employee, then assign them all at once.</p>
</div>

<form method="post" class="form-card">
  {% csrf_token %}

  <div class="form-group">
    <label for="id_employee">Assign To</label>
    <select name="employee" id="id_employee" required>
      <option value="">Choose employee...</option>

      {% if managers %}
        <optgroup label="Managers">
          {% for employee in managers %}
            <option value="{{ employee.id }}">
              {{ employee.user.first_name }} {{ employee.user.last_name }}
            </option>
          {% endfor %}
        </optgroup>
      {% endif %}

      {% if employees %}
        <optgroup label="Employees">
          {% for employee in employees %}
            <option value="{{ employee.id }}">
              {{ employee.user.first_name }} {{ employee.user.last_name }}
            </option>
          {% endfor %}
        </optgroup>
      {% endif %}
    </select>
  </div>

  <div class="form-group">
    <label>Scan Jobs</label>

    <div id="job-scan-fields">
      <input type="text" name="job" class="scan-input" placeholder="Scan job barcode" autofocus>
      <input type="text" name="job" class="scan-input" placeholder="Scan job barcode">
      <input type="text" name="job" class="scan-input" placeholder="Scan job barcode">
    </div>

    <button type="button" class="btn btn-secondary" id="add-job-field">
      + Add Job
    </button>
  </div>

  <button
    type="submit"
    class="btn btn-primary"
    onclick="return confirm('Assign all scanned jobs to this employee?');"
  >
    Assign Jobs
  </button>
</form>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const container = document.getElementById("job-scan-fields");
    const addButton = document.getElementById("add-job-field");

    addButton.addEventListener("click", function () {
      const input = document.createElement("input");
      input.type = "text";
      input.name = "job";
      input.className = "scan-input";
      input.placeholder = "Scan job barcode";

      container.appendChild(input);
      input.focus();
    });
  });
</script>

{% endblock %}
