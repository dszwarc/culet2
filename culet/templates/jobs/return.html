{% extends 'base.html' %}

{% block content %}

<div class="page-container">

    <div class="page-header">
        <h1>Return Job</h1>
        <p>Select a job and Return it to a manager.</p>
    </div>

    <div class="card">
        <form method="POST">

            {% csrf_token %}

            <div class="form-section">
                <label for="job-search">Search Job</label>

                <input
                    type="text"
                    id="job-search"
                    placeholder="Enter Job Number"
                    autocomplete="off"
                >

                <input
                    type="hidden"
                    name="job"
                    id="selected-job"
                >

                <div id="job-results" class="search-results"></div>
            </div>

            <div class="employee-sections">

                <div class="employee-group">
                    <h2>Managers</h2>

                    {% if managers %}
                        {% for employee in managers %}
                            <label class="employee-card">
                                <input
                                    type="radio"
                                    name="employee"
                                    value="{{ employee.id }}"
                                    required
                                >

                                <div class="employee-info">
                                    <div class="employee-name">
                                        {{ employee.user.first_name }}
                                        {{ employee.user.last_name }}
                                    </div>

                                    <div class="employee-meta">
                                        {{ employee.department_fk.name }}
                                    </div>
                                </div>
                            </label>
                        {% endfor %}
                    {% else %}
                        <div class="empty-state">
                            No managers available.
                        </div>
                    {% endif %}
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="primary-btn">
                    Return Job
                </button>
            </div>

        </form>
    </div>

</div>


<script>

document.addEventListener("DOMContentLoaded", function () {

    const searchInput = document.getElementById("job-search");
    const selectedJobInput = document.getElementById("selected-job");

    searchInput.addEventListener("change", function () {
        selectedJobInput.value = searchInput.value;
    });

});

</script>

{% endblock %}
