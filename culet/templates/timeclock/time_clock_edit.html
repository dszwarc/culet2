{% extends "base.html" %}

{% block content %}
<div class="page-container">

  <div class="job-card">
    <h1>Edit Time Clock Entry</h1>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{% url 'culet:report_time_clock' %}" class="btn btn-secondary">
        Cancel
      </a>
    </form>
  </div>

</div>
{% endblock %}
